# ========================
# DATABASE CONFIGURATION (PostgreSQL or MySQL)
# ========================
spring.datasource.url=${DB_URL_PROD}
spring.datasource.username=${DB_USERNAME_PROD}
spring.datasource.password=${DB_PASSWORD_PROD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool settings for production
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ========================
# SERVER CONFIGURATION
# ========================
server.servlet.context-path=${SERVLET_PATH}
server.port=${PORT:8080}

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=validate   
spring.jpa.show-sql=false                
spring.jpa.properties.hibernate.format_sql=true

# ========================
# JWT CONFIGURATION
# ========================
#Keep secret in .env and expire in 1 hour
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

# ========================
# EMAIL CONFIGURATION
# ========================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_USERNAME}
spring.mail.password=${BREVO_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from=${BREVO_FROM_EMAIL}

# ========================
# FRONTEND / BACKEND URLs
# ========================
money.manager.frontend.url=${MONEY_MANAGER_FRONTEND_URL}
app.activation.url=${MONEY_MANAGER_BACKEND_URL}

# ========================
# DATABASE CONFIGURATION (PostgreSQL or MySQL)
# ========================
spring.datasource.url=${DB_URL_PROD}           # Database URL from env
spring.datasource.username=${DB_USERNAME_PROD} # DB username from env
spring.datasource.password=${DB_PASSWORD_PROD} # DB password from env
spring.datasource.driver-class-name=org.postgresql.Driver # change if MySQL

# Connection pool settings for production
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ========================
# SERVER CONFIGURATION
# ========================
server.servlet.context-path=${SERVLET_PATH}
server.port=${PORT:8080}   # default 8080 if PORT env not set

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=validate   # validate schema in prod, never 'update'
spring.jpa.show-sql=false                # do NOT log SQL in production
spring.jpa.properties.hibernate.format_sql=true

# ========================
# JWT CONFIGURATION
# ========================
jwt.secret=${JWT_SECRET}         # keep secret in environment
jwt.expiration=3600000           # 1 hour

# ========================
# EMAIL CONFIGURATION
# ========================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_USERNAME}  # keep in env
spring.mail.password=${BREVO_PASSWORD}  # keep in env
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from=${BREVO_FROM_EMAIL} # keep in env

# ========================
# FRONTEND / BACKEND URLs
# ========================
money.manager.frontend.url=${MONEY_MANAGER_FRONTEND_URL}  # must be HTTPS
app.activation.url=${MONEY_MANAGER_BACKEND_URL}          # must be HTTPS
